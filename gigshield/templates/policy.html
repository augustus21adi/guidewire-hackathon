<!DOCTYPE html>
<html>
<head>
    <title>Select Plan</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Choose Your Plan</h2>

    <form action="/select-plan" method="post">
        <input type="hidden" name="name" value="{{ name }}">

        <div class="card">
            <h3>Basic</h3>
            <p>50% Coverage</p>
            <button name="plan" value="basic">Select</button>
        </div>

        <div class="card">
            <h3>Standard</h3>
            <p>75% Coverage</p>
            <button name="plan" value="standard">Select</button>
        </div>

        <div class="card">
            <h3>Pro</h3>
            <p>100% Coverage</p>
            <button name="plan" value="pro">Select</button>
        </div>
    </form>
</div>

</body>
</html>
