<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h2>👋 {{ name }}</h2>
    <p class="subtitle">Your Protection Dashboard</p>

    <div class="grid">
        <div class="card">
            <p>📍 Location</p>
            <p class="highlight">{{ user.location }}</p>
        </div>

        <div class="card">
            <p>⚠ Risk</p>
            <p class="highlight">{{ user.risk }}</p>
        </div>

        <div class="card">
            <p>💰 Premium</p>
            <p class="highlight">₹{{ user.premium }}</p>
        </div>

        <div class="card">
            <p>📦 Plan</p>
            <p class="highlight">{{ user.plan }}</p>
        </div>
    </div>

    <div class="card">
        <p>💸 Last Payout</p>
        <p class="highlight">₹{{ user.last_payout }}</p>
    </div>

    {% if user.fraud_flag %}
        <p class="alert">⚠ Fraud detected! Claim rejected</p>
    {% endif %}

    <h3>Simulate Disruption</h3>

    <form action="/simulate" method="post">
        <input type="hidden" name="name" value="{{ name }}">

        <button name="event" value="rain">🌧 Rain</button>
        <button name="event" value="heat">🔥 Heat</button>
        <button name="event" value="pollution">😷 Pollution</button>
    </form>

</div>

</body>
</html>
